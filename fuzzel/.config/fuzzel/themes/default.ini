[main]
include="~/.config/fuzzel/colors.ini"

font=Lilex Nerd Font Mono:size=14
prompt="> "
fields=name,generic,comment,categories,filename,keywords
icons-enabled=no
icon-theme=Papirus
lines=15
width=50
inner-pad=8
vertical-pad=8
horizontal-pad=8
layer=overlay
exit-on-keyboard-focus-loss=yes

[border]
width=0
radius=15
