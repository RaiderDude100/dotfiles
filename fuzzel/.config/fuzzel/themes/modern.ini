[main]
include="~/.config/fuzzel/colors-modern.ini"

font=Space Mono Nerd Font:size=13.7
prompt="> "
fields=name,generic,comment,categories,filename,keywords
icons-enabled=no
icon-theme=Papirus
lines=15
width=50
inner-pad=8
vertical-pad=8
horizontal-pad=8
layer=overlay
exit-on-keyboard-focus-loss=no

[border]
width=0
radius=15
