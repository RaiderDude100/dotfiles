[colors.primary]
background = "{{colors.surface.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"

[colors.normal]
black   = "{{colors.surface_variant.default.hex}}"
red     = "{{colors.on_surface_variant.default.hex}}"
green   = "{{colors.tertiary.default.hex}}"
yellow  = "{{colors.secondary.default.hex}}"
blue    = "{{colors.primary.default.hex}}"
magenta = "{{colors.primary_container.default.hex}}"
cyan    = "{{colors.secondary_container.default.hex}}"
white   = "{{colors.outline.default.hex}}"

[colors.bright]
black   = "{{colors.surface_variant.default.hex | lighten: 20.0 }}"
red     = "{{colors.on_surface_variant.default.hex | lighten: 20.0 }}"
green   = "{{colors.tertiary.default.hex | lighten: 20.0 }}"
yellow  = "{{colors.secondary.default.hex | lighten: 20.0 }}"
blue    = "{{colors.primary.default.hex | lighten: 20.0 }}"
magenta = "{{colors.primary_container.default.hex | lighten: 20.0 }}"
cyan    = "{{colors.secondary_container.default.hex | lighten: 20.0 }}"
white   = "{{colors.outline.default.hex | lighten: 20.0 }}"
